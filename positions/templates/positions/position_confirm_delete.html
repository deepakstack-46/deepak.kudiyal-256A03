{% extends 'base.html' %}

{% block title %}Delete Position - Happy Camp{% endblock %}

{% block content %}
<div class="confirm-box">
    <h2>Delete Position 🚮 </h2>
    <p>Are you sure you want to delete <strong>{{ position.position_name }}</strong>?</p>
    <div class="confirm-actions">
        <form method="POST">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Yes, Delete</button>
        </form>
        <a href="{% url 'position_list' %}" class="btn btn-primary">Cancel</a>
    </div>
</div>
{% endblock %}
