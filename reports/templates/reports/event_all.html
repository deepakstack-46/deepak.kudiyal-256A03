<!DOCTYPE html>
<html>
<head>
    <title>All Events</title>
</head>
<body>
    <h2>All Events</h2>
    <table border="1">
        <tr>
            <th>Name</th>
            <th>Description</th>
            <th>Start Date</th>
            <th>End Date</th>
        </tr>
        {% for event in events %}
        <tr>
            <td>{{ event.name }}</td>
            <td>{{ event.description }}</td>
            <td>{{ event.date_start }} {{ event.time_start }}</td>
            <td>{{ event.date_end }} {{ event.time_end }}</td>
        </tr>
        {% endfor %}
    </table>
    <br>
    <a href="{% url 'home' %}">Back to Home</a>
</body>
</html>
