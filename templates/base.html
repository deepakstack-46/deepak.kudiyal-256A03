<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Happy Camp{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    {% block navbar %}
    <nav class="navbar">
        <a href="{% url 'home' %}" class="navbar-brand">Happy Camp</a>
        {% if user.is_authenticated %}
            <span class="navbar-user">{{ user.first_name }} ({{ user.groups.all.0.name }})</span>
            <a href="{% url 'logout' %}" class="btn-logout">Logout</a>
        {% endif %}
    </nav>

    {% endblock%}
    <div class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="alert">{{ message }}</div>
            {% endfor %}
        {% endif %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>
