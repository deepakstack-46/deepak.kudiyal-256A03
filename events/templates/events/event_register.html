{% extends 'base.html' %}

{% block title %}Register for Event - Happy Camp{% endblock %}

{% block content %}
<div class="form-container">
    <h2>📋 Register for Event</h2>
    <p>{{ event.name }}</p>

    {% if messages %}
        {% for message in messages %}
            <div class="alert">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>Choose a Position</label>
            <select name="position" required>
                {% for position in positions %}
                    <option value="{{ position.pk }}">{{ position.position_name }}</option>
                {% endfor %}
            </select>
        </div>
        <button type="submit" class="btn-login">Register</button>
    </form>
    <a href="{% url 'event_list' %}" class="back-link">← Back to Events</a>
</div>
{% endblock %}
