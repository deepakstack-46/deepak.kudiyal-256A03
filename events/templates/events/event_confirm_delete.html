{% extends 'base.html' %}

{% block title %}Delete Event - Happy Camp{% endblock %}

{% block content %}
<div class="confirm-box">
    <h2>🗑️ Delete Event</h2>
    <p>Are you sure you want to delete <strong>{{ event.name }}</strong>? This will also delete all registrations for this event.</p>
    <div class="confirm-actions">
        <form method="POST">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Yes, Delete</button>
        </form>
        <a href="{% url 'event_list' %}" class="btn btn-primary">Cancel</a>
    </div>
</div>
{% endblock %}
