<!DOCTYPE html>
<html>
<head>
     <title>
        Unregister from event
    </title>
</head>
<body>
    <h2>Unregister From {{ event.name }}</h2>
    <p>Are you sure you want to unregister from <strong>{{ event.name }}</strong>?</p>
    <form method="POST">
        {% csrf_token %}
        <button type="submit">Yes, Unregister</button>
        <a href="{% url 'event_list' %}">Cancel</a>
    </form>
</body>
</html>
