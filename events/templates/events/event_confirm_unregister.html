{% extends 'base.html' %}

{% block title %}Unregister from Event - Happy Camp{% endblock %}

{% block content %}
<div class="confirm-box">
    <h2>⚠️ Unregister from Event</h2>
    <p>Are you sure you want to unregister from <strong>{{ event.name }}</strong>?</p>
    <div class="confirm-actions">
        <form method="POST">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Yes, Unregister</button>
        </form>
        <a href="{% url 'event_list' %}" class="btn btn-primary">Cancel</a>
    </div>
</div>
{% endblock %}
